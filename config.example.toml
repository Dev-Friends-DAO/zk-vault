# zk-vault configuration example
# Copy to config.toml and fill in your values.

[vault]
# Default keyfile path (used if --keyfile not specified)
# keyfile_path = "/Volumes/USB/zk-vault.key"

# Default chain node URL (used if --chain not specified)
# chain_url = "http://localhost:3030"

# Mode A: S3-compatible storage (personal mode)
# Works with AWS S3, Backblaze B2, Wasabi, MinIO, GCS, etc.
[storage.s3]
bucket = "my-zk-vault-backups"
region = "us-east-1"
# endpoint = "https://s3.us-west-000.backblazeb2.com"  # for S3-compatible providers
access_key = ""
secret_key = ""
# path_style = true  # required for MinIO and some S3-compatible providers

# Mode C: Filecoin storage (chain mode)
[storage.filecoin]
# Lotus JSON-RPC endpoint (public or self-hosted)
rpc_url = "https://api.node.glif.io/rpc/v1"
# Auth token (required for self-hosted Lotus nodes with write access)
# auth_token = "eyJ..."
# IPFS gateway for data retrieval
gateway_url = "https://dweb.link"
# Minimum storage providers per file
min_sps = 4
# Maximum price per GiB per epoch (attoFIL)
max_price_per_gib_epoch = "100000000"
# Deal duration in days
deal_duration_days = 540
# Days before expiry to trigger renewal
renew_before_days = 30

[anchor]
# Epoch length in blocks (0 = disabled). Anchor triggers every N blocks.
# epoch_length = 100
# enabled = true
# Anchor keystore path (default: ~/.zk-vault/anchor_keystore.json)
# keystore_path = "~/.zk-vault/anchor_keystore.json"

[anchor.bitcoin]
api_url = "https://mempool.space/testnet/api"
network = "testnet"
# Private key is stored in encrypted anchor_keystore.json
# Run: zk-vault anchor init --btc
# wif_private_key = ""  # DEPRECATED: use anchor keystore

[anchor.ethereum]
rpc_url = "https://sepolia.infura.io/v3/YOUR_KEY"
network = "sepolia"
# private_key_hex = ""  # DEPRECATED: use anchor keystore
chain_id = 11155111
